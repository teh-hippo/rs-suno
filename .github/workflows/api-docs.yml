name: API docs

# rustdoc builds the public API docs with intra-doc link checking. With
# `-D warnings` a broken or private-linking doc comment becomes a hard error, so
# a regression in the generated docs (part of the public surface for the first
# release) fails the build. It runs on push to main rather than per PR: a
# doc-link regression is caught on the main run, keeping pull requests lean.
# Kept as its own workflow to stay clear of the `Docs` Pages publisher and to
# avoid churn on `ci.yml`.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: api-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustdoc:
    name: cargo doc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: RUSTDOCFLAGS='-D warnings' cargo doc --workspace --all-features --no-deps
