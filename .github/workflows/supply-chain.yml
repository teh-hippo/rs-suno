name: Supply chain

# cargo-deny scans the full transitive lockfile for RustSec advisories, licence
# compatibility, and duplicate/banned crates. It is installed as a prebuilt
# binary (no compile) and run directly, matching the repo's preference for
# running Rust tooling without a third-party wrapper action. The weekly schedule
# catches advisories that land with no code change; the push leg enforces policy
# on everything that reaches main; the pull_request leg (limited to dependency
# files) catches a new dependency's advisory or licence before merge.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/**/Cargo.toml
      - deny.toml
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: cargo-deny@0.19.8
          fallback: none
      - run: cargo deny --locked --all-features check
