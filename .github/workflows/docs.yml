name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: teh-hippo/common-repo-configs/.github/workflows/mdbook.yml@5ee35e8b64328a970f0a85b963147b2b7e351886  # v2
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      path: docs
