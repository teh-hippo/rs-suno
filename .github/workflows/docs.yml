name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: teh-hippo/common-repo-configs/.github/workflows/mdbook.yml@6995ce5f2e6cc4832dc8f7457b35dabbc1bacfe6  # v2.0.2
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      path: docs
