name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: teh-hippo/common-repo-configs/.github/workflows/mdbook.yml@3d8fb0045df6c146324d6e8ac6485c6116782a05  # v3.1.0
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      path: docs
