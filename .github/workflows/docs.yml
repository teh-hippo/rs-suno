name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: teh-hippo/common-repo-configs/.github/workflows/mdbook.yml@0ea3db6a0768a59f7fc8a5dfa3f79d885fd80895  # v3.0.1
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      path: docs
