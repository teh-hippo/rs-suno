name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: teh-hippo/common-repo-configs/.github/workflows/mdbook.yml@2a1423750ab58fdbe2ce21d35f583f07c79fcdc8  # v2.0.3
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      path: docs
