name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: teh-hippo/common-repo-configs/.github/workflows/mdbook.yml@962b691da7463ad73773f2a803a5ac2a1cdd1b46  # v2.0.1
    permissions:
      pages: write
      id-token: write
      contents: read
    with:
      path: docs
