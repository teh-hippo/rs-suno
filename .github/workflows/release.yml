name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: teh-hippo/common-repo-configs/.github/workflows/rust-release.yml@0ea3db6a0768a59f7fc8a5dfa3f79d885fd80895  # v3.0.1
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      binary-name: suno
      publish-crates: '["suno-core","rs-suno"]'
      targets: '[{"target":"x86_64-unknown-linux-musl","os":"ubuntu-24.04","build-tool":"cargo","label":"x86_64-linux"},{"target":"aarch64-unknown-linux-musl","os":"ubuntu-24.04","build-tool":"cross","label":"aarch64-linux"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","build-tool":"cargo","label":"x86_64-windows","rustflags":"-C target-feature=+crt-static"},{"target":"aarch64-pc-windows-msvc","os":"windows-11-arm","build-tool":"cargo","label":"aarch64-windows","rustflags":"-C target-feature=+crt-static"}]'

  container:
    needs: release
    uses: docker/github-builder/.github/workflows/build.yml@3415a188caae9a0da7fba83bc06985776e0b1790 # v1
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      job-name-prefix: container
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      sbom: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=ref,event=tag
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
      labels: |
        org.opencontainers.image.source=https://github.com/${{ github.repository }}
        org.opencontainers.image.description=A download-only command-line tool for mirroring a Suno library.
        org.opencontainers.image.licenses=MIT AND GPL-2.0-or-later AND LGPL-2.1-or-later
        org.opencontainers.image.revision=${{ github.sha }}
        org.opencontainers.image.version=${{ github.ref_name }}
        org.opencontainers.image.title=rs-suno
        org.opencontainers.image.url=https://github.com/${{ github.repository }}
      annotations: |
        org.opencontainers.image.source=https://github.com/${{ github.repository }}
        org.opencontainers.image.description=A download-only command-line tool for mirroring a Suno library.
        org.opencontainers.image.licenses=MIT AND GPL-2.0-or-later AND LGPL-2.1-or-later
        org.opencontainers.image.revision=${{ github.sha }}
        org.opencontainers.image.version=${{ github.ref_name }}
        org.opencontainers.image.title=rs-suno
        org.opencontainers.image.url=https://github.com/${{ github.repository }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  container-verify:
    needs: container
    uses: docker/github-builder/.github/workflows/verify.yml@3415a188caae9a0da7fba83bc06985776e0b1790 # v1
    permissions:
      contents: read
      packages: read
    with:
      builder-outputs: ${{ toJSON(needs.container.outputs) }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
