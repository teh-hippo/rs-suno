name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: teh-hippo/common-repo-configs/.github/workflows/rust-release.yml@5ee35e8b64328a970f0a85b963147b2b7e351886  # v2
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      binary-name: suno
      publish-crates: '["suno-core","rs-suno"]'
      targets: '[{"target":"x86_64-unknown-linux-musl","os":"ubuntu-24.04","build-tool":"cargo","label":"x86_64-linux"},{"target":"aarch64-unknown-linux-musl","os":"ubuntu-24.04","build-tool":"cross","label":"aarch64-linux"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","build-tool":"cargo","label":"x86_64-windows","rustflags":"-C target-feature=+crt-static"},{"target":"aarch64-pc-windows-msvc","os":"windows-11-arm","build-tool":"cargo","label":"aarch64-windows","rustflags":"-C target-feature=+crt-static"}]'
