name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - run: docker build --tag rs-suno:ci .
      - name: Smoke test the image
        run: |
          docker run --rm rs-suno:ci version | tee version.txt
          grep -F 'x86_64-unknown-linux-musl' version.txt
          grep -F 'config: /config/suno/config.toml' version.txt
          grep -F 'ffmpeg:' version.txt
          test "$(docker run --rm --entrypoint id rs-suno:ci -u)" = 10001
          docker run --rm --entrypoint ffmpeg rs-suno:ci \
            -hide_banner -encoders 2>/dev/null > encoders.txt
          grep -E ' libwebp_anim ' encoders.txt
          grep -E ' libwebp ' encoders.txt
          grep -E ' alac ' encoders.txt
          grep -E ' flac ' encoders.txt
  # Windows runtime behaviour (path canonicalisation, case-insensitive renames,
  # symlink privilege) can differ even though the code is OS-agnostic, so a
  # single x86_64 leg runs on every PR and on merges to main, gating PRs beside
  # the Linux `check` leg to catch a Windows-only regression before merge, not
  # after; the release build validates every target.
  windows-check:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: cargo test --workspace --all-features --target x86_64-pc-windows-msvc
  # MSRV floor. The manifest declares rust-version = "1.96"; this leg keeps that
  # promise honest by building the workspace on exactly that toolchain, so a
  # newer-than-1.96 API slipping in is caught before it breaks a 1.96 consumer.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: "1.97.1"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: cargo check --workspace --all-features --locked
  # cargo-machete flags any direct dependency in a workspace crate's manifest
  # that no source file references: unused-dependency drift that neither clippy
  # (which sees only unused private items) nor cargo-deny (the transitive
  # lockfile) reports. It runs as a prebuilt binary with no compile, on every PR
  # and on push to main. A dependency is orphaned by a code edit dropping its
  # last use, not necessarily a manifest change, so this cannot sit behind
  # supply-chain.yml's dependency-file path filter.
  machete:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: cargo-machete@0.9.2
          fallback: none
      - run: cargo machete
