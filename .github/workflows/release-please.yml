name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    uses: teh-hippo/common-repo-configs/.github/workflows/release-please.yml@6995ce5f2e6cc4832dc8f7457b35dabbc1bacfe6  # v2.0.2
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
